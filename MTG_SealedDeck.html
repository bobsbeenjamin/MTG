<!DOCTYPE html>
<html>
<head>
  <title>A Sealed Deck Generator</title>
  <script src="sets/KLD.js"></script>
  <script src="sets/AER.js"></script>
  <script src="sets/AKH.js"></script>
  <script src="sets/XLN.js"></script>
  <script src="sets/RIX.js"></script>
  <script src="sets/GRN.js"></script>
  <script src="sets/RNA.js"></script>
  <script src="sets/WAR.js"></script>
  <script src="sets/M20.js"></script>
  <script src="sets/ELD.js"></script>
  <script src="sets/BasicLands.js"></script>
  <script src="MTG_SealedDeck_Scripts.js"></script>
  <style>
    h2 {
	  text-decoration: underline;
	  padding: 2px;
	  line-height: 0pt;
	}
	h4 {
	  line-height: 0pt;
	}
	.hand {
	  display: none; /* This class starts hidden, but is unhidden later */
	}
	label {
	  font-size: 11pt;
	}
  </style>
</head>
<body>
  <h2>Your Card Pool</h2>
  <h4>By default, your card pool is displayed in the order that you would open packs. Use the dropdowns to create your own sort.</h4>
  <label for="cardPoolFilter1">Sort By:</label>
  <select id="cardPoolFilter1">
    <option value=""></option>
    <option value="color">Color</option>
    <option value="cmc">CMC</option>
    <option value="types">Card Type</option>
    <option value="rarity">Rarity</option>
  </select>
  <label for="cardPoolFilter2">Then Sort By:</label>
  <select id="cardPoolFilter2">
    <option value=""></option>
    <option value="color">Color</option>
    <option value="cmc">CMC</option>
    <option value="types">Card Type</option>
    <option value="rarity">Rarity</option>
  </select>
  <label for="cardPoolGroupBy1">Group By:</label>
  <select id="cardPoolGroupBy1">
    <option value="" id="cardPoolGroupBy1_Default"></option>
    <!-- <option value="alphabetical">Card Name</option> -->
    <option value="color">Color</option>
    <option value="cmc">CMC</option>
    <option value="types">Card Type</option>
    <option value="rarity">Rarity</option>
  </select>
  <button id="button_cardPoolFilter">Sort</button>
  <br/>
  <canvas id="cardPool" width="832" height="104" style="border:2px solid #000000;">
    Your browser does not support the HTML5 canvas protocol. Lame!
  </canvas>
  <canvas id="cardZoom" width="223" height="312" style="position:fixed;float:right;"></canvas>
  <h2 class="deck">Your Deck</h2>
  <label for="deck1Filter1">Sort by:</label>
  <select id="deck1Filter1" class="deck">
    <option value=""></option>
    <option value="color">Color</option>
    <option value="cmc">CMC</option>
    <option value="types">Card Type</option>
    <option value="rarity">Rarity</option>
  </select>
  <label for="deck1Filter2">Then sort by:</label>
  <select id="deck1Filter2" class="deck">
    <option value=""></option>
    <option value="color">Color</option>
    <option value="cmc">CMC</option>
    <option value="types">Card Type</option>
    <option value="rarity">Rarity</option>
  </select>
  <label for="deck1GroupBy1">Group By:</label>
  <select id="deck1GroupBy1">
    <option value="" id="deck1GroupBy1_Default"></option>
    <option value="color">Color</option>
    <option value="cmc">CMC</option>
    <option value="types">Card Type</option>
    <option value="rarity">Rarity</option>
  </select>
  <button id="button_deck1Filter" class="deck">Sort</button>
  <br/>
  <canvas id="deck" class="deck" width="832" height="312" style="border:2px solid #000000;"></canvas>
  <br/>
  <button id="show_lands">Show Basic Lands</button>
  <button id="show_hand">Try deck!</button>
  <h2 class="hand">Your Hand</h2>
  <canvas id="hand" class="hand" width="832" height="104" style="border:2px solid #000000;"></canvas>
  <br/>
  <span id="player1_txt" class="hand" width="832px"></span>
  <br/>
  <button id="player1_draw" class="hand">Draw a Card</button>
  <button id="player1_mull" class="hand">Mulligan</button>
  <button id="player1_newHand" class="hand">Draw New Hand</button>
  <button id="player1_shuffle" class="hand">Shuffle Deck</button>
  <br/>
  <button id="test">Test</button>
  <label for="formatSelector">Change set/block:</label>
  <select id="formatSelector">
    <option value="ELD" id="format_Default">ELD - Throne of Eldraine</option>
    <option value="M20">M20 - Core Set 20</option>
    <option value="WAR">WAR - War of the Spark</option>
    <option value="RNA">RNA - Ravnica Allegiance</option>
    <option value="GRN">GRN - Guilds of Ravnica</option>
    <option value="RIX_XLN">RIX - Ixalan Block</option>
    <option value="XLN">XLN - Ixalan (set)</option>
    <option value="KLD_AER">AER - Kaladesh Block</option>
    <option value="KLD">KLD - Kaladesh (set)</option>
  </select>
  <span id="test_txt"></span>
  <span id="status_txt">Status</span>
</body>
</html>
